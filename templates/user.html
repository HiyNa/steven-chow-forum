<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心 - 周星驰电影论坛</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffd700;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: rgba(255, 255, 255, 0.7);
        }

        .user-profile {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .user-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #1a1a2e;
        }

        .user-info h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .user-info .role-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.85rem;
            margin-left: 10px;
        }

        .user-stats {
            display: flex;
            gap: 30px;
            margin-top: 1rem;
        }

        .user-stat {
            text-align: center;
        }

        .user-stat .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .user-stat .label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 1rem;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .tab.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            font-weight: 600;
        }

        .posts-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: #ffd700;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .movie-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .movie-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
        }

        .movie-poster {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-info {
            padding: 1rem;
        }

        .movie-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .movie-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffd700;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757, #ff6b6b);
            color: #fff;
        }

        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .logout-section {
            margin-top: 2rem;
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            animation: toastIn 0.3s ease;
            z-index: 2000;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .user-profile {
                flex-direction: column;
                text-align: center;
            }
            .user-stats {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            周星驰电影论坛
        </a>
        <div class="nav-links" id="navLinks">
            <a href="/">首页</a>
            <a href="/user">用户中心</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>用户中心</h1>
            <p>管理您的个人信息和帖子</p>
        </div>

        <div class="user-profile">
            <div class="user-avatar" id="userAvatar">?</div>
            <div class="user-info">
                <h2 id="username">加载中...</h2>
                <span class="role-badge" id="roleBadge">用户</span>
                <div class="user-stats">
                    <div class="user-stat">
                        <div class="value" id="postCount">0</div>
                        <div class="label">发帖数</div>
                    </div>
                    <div class="user-stat">
                        <div class="value" id="commentCount">0</div>
                        <div class="label">评论数</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('movies')">电影收藏</button>
            <button class="tab" onclick="switchTab('posts')">我的帖子</button>
        </div>

        <div class="posts-section">
            <div id="moviesTab">
                <h3 class="section-title">🎬 全部电影</h3>
                <div class="movie-grid" id="moviesGrid"></div>
            </div>
            <div id="postsTab" style="display: none;">
                <h3 class="section-title">📝 我的帖子</h3>
                <div id="myPosts"></div>
            </div>
        </div>

        <div class="logout-section">
            <button class="btn btn-danger" onclick="logout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                </svg>
                退出登录
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentUser = null;

        async function loadUserInfo() {
            try {
                const response = await fetch('/api/auth/current');
                const data = await response.json();
                
                if (!data.logged_in) {
                    window.location.href = '/login';
                    return;
                }
                
                currentUser = data.user;
                document.getElementById('username').textContent = data.user.username;
                document.getElementById('userAvatar').textContent = data.user.username[0].toUpperCase();
                
                const roleText = data.user.role === 'admin' ? '管理员' : '普通用户';
                document.getElementById('roleBadge').textContent = roleText;
                
                // 更新导航
                let adminLink = '';
                if (data.user.role === 'admin') {
                    adminLink = '<a href="/admin">管理</a>';
                }
                document.getElementById('navLinks').innerHTML = `
                    <a href="/">首页</a>
                    <a href="/user">用户中心</a>
                    ${adminLink}
                    <a href="#" onclick="logout()">退出</a>
                `;
                
                loadMovies();
                loadMyPosts();
            } catch (error) {
                showToast('加载用户信息失败', true);
            }
        }

        async function loadMovies() {
            try {
                const response = await fetch('/api/movies');
                const movies = await response.json();
                
                const grid = document.getElementById('moviesGrid');
                grid.innerHTML = movies.map(movie => `
                    <div class="movie-card" onclick="window.location.href='/movie/${movie.id}'">
                        <img class="movie-poster" src="${movie.poster}" alt="${movie.title}"
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 300 400%22><rect fill=%22%231a1a2e%22 width=%22300%22 height=%22400%22/><text x=%22150%22 y=%22200%22 text-anchor=%22middle%22 fill=%22%23ffd700%22 font-size=%2248%22>🎬</text></svg>'">
                        <div class="movie-info">
                            <div class="movie-title">${movie.title}</div>
                            <div class="movie-rating">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                                </svg>
                                ${movie.rating}
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showToast('加载电影失败', true);
            }
        }

        async function loadMyPosts() {
            try {
                const response = await fetch('/api/posts');
                const posts = await response.json();
                const myPosts = posts.filter(p => p.user_id === currentUser.id);
                
                document.getElementById('postCount').textContent = myPosts.length;
                document.getElementById('commentCount').textContent = myPosts.reduce((sum, p) => sum + (p.comments ? p.comments.length : 0), 0);
                
                const container = document.getElementById('myPosts');
                if (myPosts.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>您还没有发布任何帖子</p></div>';
                } else {
                    container.innerHTML = myPosts.map(post => `
                        <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 10px; margin-bottom: 1rem;">
                            <h4 style="margin-bottom: 0.5rem;">${post.title}</h4>
                            <p style="color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-bottom: 0.5rem;">${post.content.substring(0, 100)}...</p>
                            <div style="display: flex; gap: 15px; color: rgba(255,255,255,0.5); font-size: 0.85rem;">
                                <span>👁 ${post.views}</span>
                                <span>❤️ ${post.likes}</span>
                                <span>💬 ${post.comments ? post.comments.length : 0}</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('加载帖子失败');
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('moviesTab').style.display = tab === 'movies' ? 'block' : 'none';
            document.getElementById('postsTab').style.display = tab === 'posts' ? 'block' : 'none';
        }

        async function logout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (error) {
                showToast('退出失败', true);
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        loadUserInfo();
    </script>
</body>
</html>
