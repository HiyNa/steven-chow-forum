<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周星驰电影论坛 - Steven Chow Movies Forum</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* 导航栏 */
        .navbar {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffd700;
            text-decoration: none;
        }

        .nav-brand svg {
            width: 32px;
            height: 32px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
        }

        .nav-links .btn-login {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
        }

        .nav-links .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a1a2e;
        }

        /* 主容器 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* 英雄区 */
        .hero {
            text-align: center;
            padding: 3rem 0;
            position: relative;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #ffd700, #ff6b6b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 600px;
            margin: 0 auto;
        }

        /* 搜索框 */
        .search-box {
            max-width: 500px;
            margin: 2rem auto;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffd700;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .search-box button:hover {
            transform: translateY(-50%) scale(1.1);
        }

        /* 评分筛选 */
        .filter-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            border-color: #ffd700;
        }

        /* 电影卡片网格 */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding: 2rem 0;
        }

        /* 电影卡片 */
        .movie-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: #ffd700;
        }

        .movie-poster {
            width: 100%;
            height: 350px;
            object-fit: cover;
            transition: transform 0.4s;
        }

        .movie-card:hover .movie-poster {
            transform: scale(1.05);
        }

        .movie-poster-wrapper {
            overflow: hidden;
            position: relative;
        }

        .movie-rating {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .movie-info {
            padding: 1.5rem;
        }

        .movie-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .movie-meta {
            display: flex;
            gap: 15px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .movie-genre {
            display: inline-block;
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-y: auto;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: #ff4757;
            transform: rotate(90deg);
        }

        .modal-header {
            position: relative;
        }

        .modal-poster {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .modal-rating {
            position: absolute;
            bottom: -30px;
            right: 30px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
        }

        .modal-body {
            padding: 2rem;
            padding-top: 3rem;
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #ffd700;
        }

        .modal-meta {
            display: flex;
            gap: 20px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .modal-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .modal-description {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 统计信息 */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 3rem 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffd700;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 3rem;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .navbar {
                flex-direction: column;
                gap: 1rem;
            }

            .movies-grid {
                grid-template-columns: 1fr;
            }

            .modal {
                margin: 1rem;
            }
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            display: none;
            animation: toastIn 0.3s ease;
            z-index: 2000;
        }

        .toast.error {
            background: linear-gradient(135deg, #ff4757, #ff6b6b);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 隐藏滚动条但保持功能 */
        .modal::-webkit-scrollbar {
            width: 8px;
        }

        .modal::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        .modal::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            周星驰电影论坛
        </a>
        <div class="nav-links" id="navLinks">
            <a href="/">首页</a>
            <a href="/login" class="btn-login">登录</a>
            <a href="/register">注册</a>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container">
        <!-- 英雄区 -->
        <div class="hero">
            <h1>🎬 周星驰电影殿堂</h1>
            <p>经典无厘头喜剧，豆瓣评分见证不朽传奇。一起重温星爷带给我们的欢笑与感动。</p>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索电影名称..." oninput="filterMovies()">
            <button onclick="filterMovies()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="#1a1a2e">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
            </button>
        </div>

        <!-- 评分筛选 -->
        <div class="filter-section">
            <button class="filter-btn active" onclick="setRatingFilter(0)">全部</button>
            <button class="filter-btn" onclick="setRatingFilter(9)">9分以上</button>
            <button class="filter-btn" onclick="setRatingFilter(8)">8分以上</button>
            <button class="filter-btn" onclick="setRatingFilter(7)">7分以上</button>
        </div>

        <!-- 电影网格 -->
        <div class="movies-grid" id="moviesGrid">
            <!-- 电影卡片将通过 JS 动态生成 -->
        </div>

        <!-- 统计信息 -->
        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-value" id="movieCount">0</div>
                <div class="stat-label">经典电影</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgRating">0</div>
                <div class="stat-label">平均评分</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="highRating">0</div>
                <div class="stat-label">9分以上</div>
            </div>
        </div>
    </div>

    <!-- 电影详情模态框 -->
    <div class="modal-overlay" id="movieModal">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                </svg>
            </button>
            <div class="modal-header">
                <img class="modal-poster" id="modalPoster" src="" alt="">
                <div class="modal-rating" id="modalRating">0.0</div>
            </div>
            <div class="modal-body">
                <h2 class="modal-title" id="modalTitle">电影名称</h2>
                <div class="modal-meta">
                    <span id="modalYear">1990</span>
                    <span id="modalDirector">导演</span>
                    <span id="modalDuration">时长</span>
                </div>
                <div class="movie-genre" id="modalGenre">类型</div>
                <p class="modal-description" id="modalDescription">电影描述...</p>
                <div class="modal-actions">
                    <button class="btn btn-primary" onclick="viewPosts()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M21 6h-2v9H6v2c0 .55.45 1 1 1h11l4 4V7c0-.55-.45-1-1-1zm-4 6V3c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v14l4-4h10c.55 0 1-.45 1-1z"/>
                        </svg>
                        查看讨论
                    </button>
                    <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2024 周星驰电影论坛 | 致敬经典，欢笑永恒</p>
    </footer>

    <script>
        // 全局变量
        let movies = [];
        let currentMovie = null;
        let ratingFilter = 0;

        // 获取电影数据
        async function fetchMovies() {
            try {
                const response = await fetch('/api/movies');
                movies = await response.json();
                renderMovies(movies);
                updateStats();
            } catch (error) {
                showToast('加载电影数据失败', true);
            }
        }

        // 渲染电影卡片
        function renderMovies(moviesToRender) {
            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = '';

            const filtered = moviesToRender.filter(m => m.rating >= ratingFilter);

            filtered.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openModal(movie);
                card.innerHTML = `
                    <div class="movie-poster-wrapper">
                        <img class="movie-poster" src="${movie.poster}" alt="${movie.title}" 
                             onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 300 400%22><rect fill=%22%231a1a2e%22 width=%22300%22 height=%22400%22/><text x=%22150%22 y=%22200%22 text-anchor=%22middle%22 fill=%22%23ffd700%22 font-size=%2224%22>🎬</text></svg>'">
                        <div class="movie-rating">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="#1a1a2e">
                                <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                            </svg>
                            ${movie.rating}
                        </div>
                    </div>
                    <div class="movie-info">
                        <h3 class="movie-title">${movie.title}</h3>
                        <div class="movie-meta">
                            <span>${movie.year}</span>
                            <span>${movie.director}</span>
                        </div>
                        <span class="movie-genre">${movie.genre}</span>
                    </div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('movieCount').textContent = filtered.length;
        }

        // 更新统计数据
        function updateStats() {
            if (movies.length === 0) return;
            
            const avgRating = (movies.reduce((sum, m) => sum + m.rating, 0) / movies.length).toFixed(1);
            const highRating = movies.filter(m => m.rating >= 9).length;
            
            document.getElementById('avgRating').textContent = avgRating;
            document.getElementById('highRating').textContent = highRating;
        }

        // 搜索过滤
        function filterMovies() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = movies.filter(m => 
                m.title.toLowerCase().includes(query) ||
                m.director.toLowerCase().includes(query) ||
                m.genre.toLowerCase().includes(query)
            );
            renderMovies(filtered);
        }

        // 设置评分筛选
        function setRatingFilter(rating) {
            ratingFilter = rating;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            filterMovies();
        }

        // 打开模态框
        function openModal(movie) {
            currentMovie = movie;
            document.getElementById('modalPoster').src = movie.poster;
            document.getElementById('modalRating').textContent = movie.rating;
            document.getElementById('modalTitle').textContent = movie.title;
            document.getElementById('modalYear').textContent = movie.year + '年';
            document.getElementById('modalDirector').textContent = '导演: ' + movie.director;
            document.getElementById('modalDuration').textContent = movie.duration;
            document.getElementById('modalGenre').textContent = movie.genre;
            document.getElementById('modalDescription').textContent = movie.description;
            document.getElementById('movieModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('movieModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // 查看帖子
        function viewPosts() {
            if (currentMovie) {
                window.location.href = `/movie/${currentMovie.id}`;
            }
        }

        // Toast 提示
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // 检查登录状态
        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/auth/current');
                const data = await response.json();
                
                if (data.logged_in) {
                    const navLinks = document.getElementById('navLinks');
                    let adminLink = '';
                    if (data.user.role === 'admin') {
                        adminLink = '<a href="/admin">管理</a>';
                    }
                    navLinks.innerHTML = `
                        <a href="/">首页</a>
                        <a href="/user">用户中心</a>
                        ${adminLink}
                        <div class="user-info">
                            <div class="user-avatar">${data.user.username[0].toUpperCase()}</div>
                            <span>${data.user.username}</span>
                        </div>
                        <a href="#" onclick="logout()">退出</a>
                    `;
                }
            } catch (error) {
                console.error('检查登录状态失败');
            }
        }

        // 登出
        async function logout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (error) {
                showToast('退出失败', true);
            }
        }

        // 点击模态框外部关闭
        document.getElementById('movieModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // ESC 键关闭模态框
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 初始化
        fetchMovies();
        checkLoginStatus();
    </script>
</body>
</html>
